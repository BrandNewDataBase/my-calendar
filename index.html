<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FAF7F2">
  <title>내 캘린더</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <script>
    // CSS 로드 전에 테마를 결정해 다크 모드 첫 화면 번쩍임 방지
    try {
      var s = JSON.parse(localStorage.getItem('mycal:settings') || '{}');
      document.documentElement.dataset.theme =
        s.theme || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    } catch (e) {}
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body data-tab="calendar">
  <header class="app-header">
    <div class="header-left">
      <div class="logo">
        <svg class="logo-mark" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <rect x="3" y="5" width="18" height="16" rx="4" fill="var(--accent)"/>
          <rect x="3" y="9" width="18" height="12" rx="3" fill="var(--accent-soft2, #fff)" opacity="0.92"/>
          <rect x="6" y="2.5" width="2.6" height="5" rx="1.3" fill="var(--accent)"/>
          <rect x="15.4" y="2.5" width="2.6" height="5" rx="1.3" fill="var(--accent)"/>
          <circle cx="8.5" cy="14" r="1.6" fill="var(--accent)"/>
          <circle cx="12" cy="14" r="1.6" fill="var(--accent)" opacity="0.55"/>
          <circle cx="15.5" cy="14" r="1.6" fill="var(--accent)" opacity="0.3"/>
        </svg>
        <span id="app-logo-text">내 캘린더</span>
      </div>
      <nav class="tabs" role="tablist">
        <button type="button" id="tab-btn-calendar" class="tab-btn active" role="tab">캘린더</button>
        <button type="button" id="tab-btn-memo" class="tab-btn" role="tab">메모</button>
      </nav>
    </div>

    <div class="header-center cal-only">
      <button type="button" id="btn-today" class="btn btn-outline">오늘</button>
      <div class="nav-arrows">
        <button type="button" id="btn-prev" class="icon-btn">‹</button>
        <button type="button" id="btn-next" class="icon-btn">›</button>
      </div>
      <h2 id="cal-title" class="cal-title"></h2>
    </div>

    <div class="header-right">
      <div id="dday-root" class="dday-root cal-only"></div>
      <div class="search-box cal-only">
        <input id="search-input" type="search" autocomplete="off">
        <div id="search-results" class="search-results"></div>
      </div>
      <div id="view-switch" class="view-switch cal-only">
        <button type="button" data-view="month"></button>
        <button type="button" data-view="week"></button>
        <button type="button" data-view="day"></button>
      </div>
      <select id="lang-select" class="lang-select" aria-label="Language"></select>
      <button type="button" id="theme-toggle" class="icon-btn">🌙</button>
      <button type="button" id="settings-btn" class="icon-btn">⚙</button>
    </div>
  </header>

  <main class="app-main">
    <div id="calendar-tab" class="tab-panel">
      <aside class="sidebar">
        <button type="button" id="btn-new-event" class="btn btn-primary btn-block"></button>
        <div id="mini-cal" class="mini-cal"></div>
        <div class="cat-section">
          <div class="cat-head">
            <h4 id="cat-heading"></h4>
            <button type="button" id="cat-add-btn" class="btn btn-ghost btn-xs"></button>
          </div>
          <div id="category-list" class="category-list"></div>
        </div>
        <div id="notif-banner" class="notif-banner"></div>
      </aside>
      <section id="view-container" class="view-container"></section>
      <aside id="day-panel" class="day-panel"></aside>
    </div>

    <div id="memo-tab" class="tab-panel">
      <div id="memo-toolbar" class="memo-toolbar"></div>
      <div id="memo-grid" class="memo-grid"></div>
    </div>
  </main>

  <div id="modal-root"></div>
  <div id="toast-container" class="toast-container"></div>

  <script src="./libs/korean-lunar-calendar.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
